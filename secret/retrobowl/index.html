<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Retro Bowl | billy-bit console</title>

    <!-- Fonts (match your site) -->
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600&family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;

            font-family: 'Exo 2', sans-serif;
            color: #abcfff;

            /* Nebula background (replace with exact one from styles.css if you want perfect match) */
            background:
                radial-gradient(circle at 20% 30%, rgba(90,120,200,0.15), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(140,90,200,0.12), transparent 50%),
                #05070d;
        }

        /* ===== IFRAME ===== */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            background: #000;
            z-index: 1;
        }

        /* ===== HUD (top-left identity block) ===== */
        .hud-tl {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 5;
            pointer-events: none;
        }

        .site-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            color: #abcfff;
        }

        .site-sub {
            font-size: 11px;
            color: #4a6a9a;
            margin-top: 2px;
        }

        /* ===== BACK LINK (top-right) ===== */
        .back-link {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 6;

            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            letter-spacing: 1px;

            color: #4a6a9a;
            text-decoration: none;

            transition: all 0.2s ease;
        }

        .back-link:hover {
            color: #abcfff;
        }

        /* ===== FULLSCREEN BUTTON ===== */
        .fullscreen-btn {
            position: absolute;
            top: 50px;
            right: 20px;
            z-index: 6;

            background: none;
            border: none;
            cursor: pointer;

            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 1px;

            color: #4a6a9a;
            transition: all 0.2s ease;
        }

        .fullscreen-btn:hover {
            color: #abcfff;
        }

        /* ===== STARS ===== */
        .stars, .stars2, .stars3 {
            position: absolute;
            width: 100%;
            height: 100%;
            background-repeat: repeat;
            z-index: 0;
        }

        .stars {
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 3px 3px;
            opacity: 0.2;
        }

        .stars2 {
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 2px 2px;
            opacity: 0.15;
        }

        .stars3 {
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 1px 1px;
            opacity: 0.1;
        }

        /* ===== SCANLINES ===== */
        .scanlines {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 7;
            pointer-events: none;

            background: repeating-linear-gradient(
                to bottom,
                rgba(255,255,255,0.02),
                rgba(255,255,255,0.02) 1px,
                transparent 1px,
                transparent 3px
            );
        }

    </style>
</head>

<body>

    <!-- Background effects -->
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>

    <!-- HUD -->
    <div class="hud-tl">
        <div class="site-name">MISSION CONTROL</div>
        <div class="site-sub">retro console</div>
    </div>

    <!-- Navigation -->
    <a href="/" class="back-link">&lt; BACK</a>
    <button class="fullscreen-btn" onclick="document.querySelector('iframe').requestFullscreen()">
        FULLSCREEN
    </button>

    <!-- Game -->
    <iframe src="https://retro-bowl-six.vercel.app" allowfullscreen></iframe>

    <!-- Overlay -->
    <div class="scanlines"></div>

</body>
</html>
