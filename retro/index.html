<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Retro Bowl</title>
    <style>
        body, html {
            background: #000; margin: 0; padding: 0;
            width: 100%; height: 100%; overflow: hidden;
            touch-action: none;
        }
        /* This forces the browser to prioritize the game's speed */
        canvas {
            image-rendering: auto; /* Smoother look as requested */
            width: 100vw; height: 100vh;
            max-width: 100%; max-height: 100%;
            object-fit: contain;
            display: block;
            margin: auto;
        }
        .ui-btn {
            position: absolute; z-index: 100;
            background: rgba(0, 0, 0, 0.5); color: #888;
            border: 1px solid #222; padding: 6px 12px;
            font-size: 11px; text-decoration: none; cursor: pointer;
            opacity: 0; transition: opacity 0.3s;
            font-family: monospace;
        }
        body:hover .ui-btn { opacity: 1; }
        #back { top: 10px; left: 10px; }
        #full { top: 10px; right: 10px; }
    </style>
</head>
<body>

    <a href="/" id="back" class="ui-btn">BACK_TO_HOME</a>
    <button id="full" class="ui-btn" onclick="document.documentElement.requestFullscreen()">FULLSCREEN</button>

    <div id="gm4html5_div_id">
        <canvas id="canvas" width="853" height="480"></canvas>
    </div>

    <!-- The Game File -->
    <script type="text/javascript" src="html5game/RetroBowl.js"></script>

    <script>
        // FULL OVERRIDE: Start the game engine directly to stop the laggy checks
        window.onload = function() {
            if (typeof GameMaker_Init === "function") {
                // Clear any weird background loops
                window.PokiSDK = {
                    init: function() { return Promise.resolve(); },
                    isAdBlocked: function() { return false; },
                    happyTime: function() {},
                    gameLoadingFinished: function() {}
                };
                GameMaker_Init();
            }
        };
    </script>
</body>
</html>
