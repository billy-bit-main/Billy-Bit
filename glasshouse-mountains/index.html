<!-- important safety stuff DO NOT TOUCH -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Glasshouse Mountains</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
</head>
<!-- the actual editable stuff -->
<body>
  <img src="vines.png" alt="Draping Vines" class="vines-overlay">
    <button id="homeBtn">
      <i class="fa-solid fa-house"></i>
    </button>
    <div class="image-grid">
      <img src="GlasshouseMountainsOne.webp" alt="Mountain 1">
      <img src="GlasshouseMountainsTwo.jpeg" alt="Mountain 2">
      <img src="GlasshouseMountainsThree.jpg" alt="Mountain 3">
      <img src="GlasshouseMountainsFour.jpg" alt="Mountain 4">
      <img src="GlasshouseMountainsFive.jpg" alt="Mountain 5">
      <img src="GlasshouseMountainsSix.jpg" alt="Mountain 6">
      <img src="GlasshouseMountainsSeven.jpg" alt="Mountain 7">
      <img src="GlasshouseMountainsEight.jpg" alt="Mountain 8">
      <img src="GlasshouseMountainsNine.jpg" alt="Mountain 9">
      <img src="GlasshouseMountainsTen.jpg" alt="Mountain 10">
      <img src="GlasshouseMountainsEleven.jpg" alt="Mountain 11">
      <img src="GlasshouseMountainsTwelve.jpg" alt="Mountain 12">
      <img src="GlasshouseMountainsThirteen.jpg" alt="Mountain 13">
      <img src="GlasshouseMountainsFourteen.jpg" alt="Mountain 14">
      <img src="GlasshouseMountainsFifteen.jpg" alt="Mountain 15">
    </div>
    <div id="introPanel">
      <div class="heading-box">
        <h2 class="main-title">GLASSHOUSE MOUNTAINS<span class="subtitle">INTERACTIVE MAP</span></h2>
      </div>
      <div id="introText">
        <p>The Glasshouse Mountains, located about 70km north of Brisbane, are remnants of ancient volcanoes. The peaks are made of trachyte and rhyolite and were active 25-27 million years ago.</p>
      </div>
      <button id="closeBtn">Enter Scene</button>
    </div>
  
  <div id="tooltip" style="
    position: absolute;
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 6px 10px;
    border-radius: 4px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    font-family: sans-serif;
    font-size: 14px;
  "></div>
  <div id="infoPanel" class="hidden">
    <h4 id="infoTitle"></h4>
    <p id="infoText"></p>
    <button id="closeInfo">Close</button>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
