<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Billy-Bit | Retro Bowl Console</title>
    <style>
        /* --- BILLY-BIT PYTHON THEME COLOR PALETTE --- */
        :root {
            --bg-gradient: radial-gradient(circle at top left, #2a0a4a 0%, #050510 100%);
            --accent-cyan: #00d4ff;
            --billy-purple: #7a28ff;
            --text-main: #ffffff;
            --text-dim: #888899;
        }

        body, html {
            background: var(--bg-gradient);
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Exo 2', 'Segoe UI', sans-serif; /* Similar to your Python page */
            display: flex; flex-direction: column;
        }

        /* --- HEADER AREA --- */
        .mission-control {
            position: absolute;
            top: 20px; left: 30px;
            z-index: 10;
            text-align: left;
        }
        .mission-control h2 {
            margin: 0; font-size: 14px; letter-spacing: 2px;
            color: var(--text-dim); text-transform: uppercase;
        }
        .mission-control h1 {
            margin: 0; font-size: 28px; color: var(--text-main);
            font-weight: 800; border-bottom: 2px solid var(--accent-cyan);
            display: inline-block;
        }

        /* --- GAME ENGINE CONTAINER --- */
        .gm4html5_div_class {
            flex-grow: 1;
            display: flex; justify-content: center; align-items: center;
            margin-top: 60px; /* Space for header */
        }

        canvas {
            image-rendering: pixelated;
            width: 100vw; height: calc(100vh - 80px);
            object-fit: contain;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* --- FOOTER CONTROLS --- */
        .console-footer {
            height: 60px; background: rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; border-top: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .btn {
            background: rgba(122, 40, 255, 0.2);
            border: 1px solid var(--billy-purple);
            color: var(--accent-cyan);
            padding: 8px 16px; border-radius: 4px;
            font-weight: bold; cursor: pointer;
            transition: 0.3s; text-transform: uppercase;
        }
        .btn:hover { background: var(--billy-purple); color: white; box-shadow: 0 0 15px var(--billy-purple); }

        /* --- MOBILE PROTECTION --- */
        #rotate-warning {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg-gradient); z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
            color: var(--accent-cyan); text-align: center;
        }
        @media screen and (orientation: portrait) {
            #rotate-warning { display: flex; }
        }
    </style>
</head>

<body>
    <div id="rotate-warning"><h1>⟳</h1><p>PLEASE ROTATE DEVICE</p></div>

    <div class="mission-control">
        <h2>MISSION CONTROL</h2>
        <h1>billy-bit</h1>
        <p style="color: var(--accent-cyan); font-size: 10px; margin: 5px 0;">SYSTEM: RETRO_BOWL.EXE</p>
    </div>

    <div class="gm4html5_div_class" id="gm4html5_div_id">
        <canvas id="canvas" width="853" height="480"></canvas>
    </div>

    <div class="console-footer">
        <a href="/python" style="color: var(--text-dim); text-decoration: none; font-size: 12px;">&larr; BACK TO PROJECTS</a>
        <button class="btn" onclick="document.documentElement.requestFullscreen()">[ FULLSCREEN ]</button>
    </div>

    <script type="text/javascript" src="html5game/RetroBowl.js"></script>
    <script>
        window.addEventListener("load", function(_) {
            window.PokiSDK = null; 
            if (typeof GameMaker_Init === "function") { GameMaker_Init(); }
        });
    </script>
</body>
</html>
