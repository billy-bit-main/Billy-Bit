<!DOCTYPE html>
<html>
<head>
    <title>Retro Bowl | billy-bit console</title>
    <style>
        body, html {
            background: #000; margin: 0; padding: 0;
            width: 100%; height: 100%; overflow: hidden;
            font-family: monospace;
        }
        /* The iFrame fills the screen perfectly */
        iframe {
            width: 100vw; height: 100vh;
            border: none; background: #000;
        }
        /* Floating HUD Buttons */
        .hud {
            position: absolute; top: 10px; left: 10px; z-index: 10;
            opacity: 0.2; transition: opacity 0.3s;
        }
        .hud:hover { opacity: 1; }
        .btn {
            background: rgba(0,255,204,0.1); border: 1px solid #00ffcc;
            color: #00ffcc; padding: 5px 10px; cursor: pointer;
            text-decoration: none; font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="hud">
        <a href="/" class="btn">< BACK</a>
        <button class="btn" onclick="document.querySelector('iframe').requestFullscreen()">FULLSCREEN</button>
    </div>

    <!-- This source is a known high-performance unblocked mirror -->
    <iframe src="https://retro-bowl-six.vercel.app" allowfullscreen></iframe>

</body>
</html>
