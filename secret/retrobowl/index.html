<!DOCTYPE html>
<html>
<head>
    <title>Retro Bowl | billy-bit console</title>
    <style>
        body, html {
            background: #000; margin: 0; padding: 0;
            width: 100%; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* The game window */
        iframe {
            width: 100vw; height: 100vh;
            border: none; background: #000;
        }

        /* Top Right UI from your screenshot */
        .header-ui {
            position: absolute; top: 15px; right: 20px;
            z-index: 100; text-align: right;
            pointer-events: none; /* Allows clicking through to game if needed */
        }
        
        .btn {
            display: block; pointer-events: auto;
            color: #444; text-decoration: none;
            font-size: 11px; letter-spacing: 1px;
            margin-bottom: 5px; cursor: pointer;
            background: none; border: none; padding: 0;
            text-transform: uppercase;
        }

        .btn:hover { color: #fff; }

        /* MISSION CONTROL branding */
        .branding {
            position: absolute; top: 15px; left: 20px;
            color: #444; font-size: 11px; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="branding">MISSION CONTROL</div>

    <div class="header-ui">
        <a href="/" class="btn">< BACK</a>
        <button class="btn" onclick="document.querySelector('iframe').requestFullscreen()">FULLSCREEN</button>
    </div>

    <!-- This is a high-speed, direct engine link -->
    <iframe src="https://konggames.com" allowfullscreen></iframe>

</body>
</html>
