<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Retro Bowl</title>
    <style>
        /* FULL BLANK STYLE */
        body, html {
            background: #000;
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gm4html5_div_class {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            image-rendering: pixelated;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* HIDDEN BUTTONS (Visible on hover) */
        .ui-btn {
            position: absolute;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid #444;
            padding: 5px 10px;
            font-size: 10px;
            text-decoration: none;
            cursor: pointer;
            opacity: 0; /* Hidden by default */
            transition: opacity 0.2s;
            font-family: sans-serif;
        }

        body:hover .ui-btn {
            opacity: 0.5; /* Subtle visibility when moving mouse */
        }

        .ui-btn:hover {
            opacity: 1 !important;
        }

        #back { top: 10px; left: 10px; }
        #full { top: 10px; right: 10px; }
    </style>
</head>
<body>

    <a href="/" id="back" class="ui-btn">BACK</a>
    <button id="full" class="ui-btn" onclick="document.documentElement.requestFullscreen()">FULLSCREEN</button>

    <div class="gm4html5_div_class" id="gm4html5_div_id">
        <canvas id="canvas" width="853" height="480"></canvas>
    </div>

    <script type="text/javascript" src="html5game/RetroBowl.js"></script>
    <script>
        window.addEventListener("load", function() {
            window.PokiSDK = null; 
            if (typeof GameMaker_Init === "function") { GameMaker_Init(); }
        });
    </script>
</body>
</html>
