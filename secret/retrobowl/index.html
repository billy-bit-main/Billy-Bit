<!DOCTYPE html>
<html>
<head>
    <title>Retro Bowl | Console</title>
    <style>
        body, html {
            background: #000; margin: 0; padding: 0;
            width: 100%; height: 100%; overflow: hidden;
            font-family: monospace;
        }

        /* The game fills the viewport completely */
        iframe {
            width: 100vw; height: 100vh;
            border: none; background: #000;
        }

        /* Minimal UI buttons in the top right */
        .hud {
            position: absolute; top: 10px; right: 10px; z-index: 99;
            opacity: 0.1; transition: opacity 0.3s;
        }
        .hud:hover { opacity: 1; }
        .btn {
            background: #111; color: #444; border: 1px solid #333;
            padding: 5px 10px; font-size: 10px; cursor: pointer; text-decoration: none;
        }
        .btn:hover { color: #fff; border-color: #fff; }
    </style>
</head>
<body>

    <div class="hud">
        <a href="/" class="btn">BACK</a>
        <button class="btn" onclick="document.querySelector('iframe').requestFullscreen()">FULLSCREEN</button>
    </div>

    <!-- This source uses Vercel for high performance and is rarely blocked -->
    <iframe src="https://retro-bowl-six.vercel.app" allowfullscreen></iframe>

</body>
</html>
