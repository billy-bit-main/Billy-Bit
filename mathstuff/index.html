<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Top Secret Arcade</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: #eee; padding: 20px; text-align: center; }
        h1 { color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; max-width: 1200px; margin: 30px auto; }
        .game-container { background: #222; padding: 15px; border-radius: 12px; border: 1px solid #444; transition: transform 0.2s; }
        .game-container:hover { transform: scale(1.02); border-color: #00ffcc; }
        iframe { width: 100%; height: 300px; border: none; border-radius: 8px; background: #000; }
        .fs-btn { margin-top: 15px; padding: 10px 20px; background: #00ffcc; color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .fs-btn:hover { background: #00cca3; }
        h2 { font-size: 1.1rem; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h1>Top Secret Arcade</h1>
    <p>Click the button below any game to go full screen.</p>

    <div class="game-grid">
        <!-- Game 1 -->
        <div class="game-container">
            <h2>Retro Bowl</h2>
            <iframe id="game1" src="https://retrobowl76.io" allow="fullscreen" allowfullscreen></iframe>
            <button class="fs-btn" onclick="openFullscreen('game1')">ENTER FULLSCREEN</button>
        </div>

        <!-- Game 2 -->
        <div class="game-container">
            <h2>OvO</h2>
            <iframe id="game2" src="https://mortgagecalculator.org" allow="fullscreen" allowfullscreen></iframe>
            <button class="fs-btn" onclick="openFullscreen('game2')">ENTER FULLSCREEN</button>
        </div>

        <!-- Game 3 -->
        <div class="game-container">
            <h2>Learn to Fly 2</h2>
            <iframe id="game3" src="https://hoodamath.com" allow="fullscreen" allowfullscreen></iframe>
            <button class="fs-btn" onclick="openFullscreen('game3')">ENTER FULLSCREEN</button>
        </div>

        <!-- Game 4 -->
        <div class="game-container">
            <h2>Run 3</h2>
            <iframe id="game4" src="https://engineering.com" allow="fullscreen" allowfullscreen></iframe>
            <button class="fs-btn" onclick="openFullscreen('game4')">ENTER FULLSCREEN</button>
        </div>

        <!-- Game 5 -->
        <div class="game-container">
            <h2>Big ICE Tower Tiny Square</h2>
            <iframe id="game5" src="https://google.com" allow="fullscreen" allowfullscreen></iframe>
            <button class="fs-btn" onclick="openFullscreen('game5')">ENTER FULLSCREEN</button>
        </div>
    </div>

    <script>
        function openFullscreen(id) {
            var elem = document.getElementById(id);
            // Check for various browser supports as shown on Stack Overflow and MDN
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) { /* Safari */
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { /* IE11 */
                elem.msRequestFullscreen();
            }
        }
    </script>

</body>
</html>
