<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
        <title>Retro Bowl | Billy-Bit</title>
        <style>
            body, html {
              background: #000;
              margin: 0; padding: 0;
              width: 100%; height: 100%;
              overflow: hidden; /* Fixes the cutting off/scrolling */
              display: flex;
              align-items: center;
              justify-content: center;
            }
            canvas {
              image-rendering: pixelated;
              max-width: 100%;
              max-height: 100%;
              object-fit: contain; /* Keeps the game shape correct */
            }
            .gm4html5_div_class {
              width: 100%;
              height: 100%;
              display: flex;
              justify-content: center;
              align-items: center;
            }
        </style>
    </head>
    <body>
        <div class="gm4html5_div_class" id="gm4html5_div_id">
            <canvas id="canvas" width="853" height="480">
                <p>Your browser doesn't support HTML5 canvas.</p>
            </canvas>
        </div>

        <!-- This loads the actual game logic -->
        <script type="text/javascript" src="html5game/RetroBowl.js"></script>

        <script>
            // This starts the game without the Poki "Site Lock" check
            window.addEventListener("load", function(_) {
                window.PokiSDK = null;
                if (typeof GameMaker_Init === "function") {
                    GameMaker_Init();
                }
            });
        </script>
    </body>
</html>
