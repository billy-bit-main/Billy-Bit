<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Top Secret Arcade</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; text-align: center; }
        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        .game-container { background: #333; padding: 10px; border-radius: 8px; }
        iframe { 
            width: 100%; 
            height: 300px; 
            border: none; 
            border-radius: 4px; 
            background: black; 
        }
        h2 { font-size: 1.2rem; margin-bottom: 10px; color: #ffcc00; }
    </style>
</head>
<body>
    <h1>Top Secret Arcade</h1>
    <div class="game-grid">
        <div class="game-container">
            <h2>Retro Bowl</h2>
            <iframe src="https://retrobowl76.io/" allow="fullscreen" allowfullscreen></iframe>
        </div>
        <div class="game-container">
            <h2>OvO</h2>
            <iframe src="https://www.mortgagecalculator.org/money-games/ovo/" allow="fullscreen" allowfullscreen></iframe>
        </div>
        <div class="game-container">
            <h2>Learn to Fly 2</h2>
            <iframe src="https://www.hoodamath.com/games/learntofly2.html" allow="fullscreen" allowfullscreen></iframe>
        </div>
        <div class="game-container">
            <h2>Run 3</h2>
            <iframe src="https://www.engineering.com/games/run-3/" allow="fullscreen" allowfullscreen></iframe>
        </div>
        <div class="game-container">
            <h2>Big ICE Tower Tiny Square</h2>
            <iframe src="https://sites.google.com/site/coolmathgames247/big-ice-tower-tiny-square" allow="fullscreen" allowfullscreen></iframe>
        </div>
    </div>
</body>
</html>
