<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Bowl | Billy-Bit</title>
    <style>
        body, html {
            background: #000; margin: 0; padding: 0;
            width: 100%; height: 100%; overflow: hidden;
            font-family: monospace;
        }

        /* The Game Container */
        iframe {
            width: 100vw; height: 100vh;
            border: none; background: #000;
        }

        /* Subtle Corner UI */
        .ui-overlay {
            position: absolute; top: 15px; right: 20px;
            z-index: 100; text-align: right;
        }
        
        .btn {
            display: block; color: #444; text-decoration: none;
            font-size: 11px; letter-spacing: 1px;
            margin-bottom: 5px; cursor: pointer;
            background: none; border: none; padding: 0;
            text-transform: uppercase;
        }

        .btn:hover { color: #00ffcc; }

        .branding {
            position: absolute; top: 15px; left: 20px;
            color: #333; font-size: 11px; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="branding">MISSION CONTROL</div>

    <div class="ui-overlay">
        <a href="/" class="btn">< BACK</a>
        <button class="btn" onclick="document.querySelector('iframe').requestFullscreen()">FULLSCREEN</button>
    </div>

    <!-- This is a high-performance mirror on the Render network -->
    <iframe src="https://onrender.com" allowfullscreen></iframe>

</body>
</html>
